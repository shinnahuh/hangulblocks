<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 놀이</title>
    <style>
        body { background: #fdfdfd; margin: 0; overflow: hidden; touch-action: none; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 메뉴 */
        #menu { margin-top: 20px; display: flex; gap: 10px; align-items: center; z-index: 100; }
        #hint { font-size: 40px; font-weight: 900; color: #333; letter-spacing: 10px; background: #fff; padding: 10px 30px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.1; }
        .btn:active { transform: scale(0.95); }
        .btn-reset { background: #ffcc00; color: #333; }
        .btn-change { background: #007AFF; color: white; }

        /* 조립 판 */
        #drop-zone { display: flex; gap: 30px; margin-top: 40px; min-height: 300px; }
        .char-box { width: 250px; height: 250px; border: 4px solid #f0f0f0; background: white; position: relative; border-radius: 30px; }

        /* 자모 조각 */
        .jamo { position: absolute; font-size: 100px; font-weight: 900; color: #444; cursor: grab; user-select: none; line-height: 1; z-index: 50; padding: 10px; }
        .jamo.in-box { color: #007AFF; z-index: 40; }

        /* 하단 보관함 */
        #bin { width: 100%; height: 200px; background: #f9f9f9; border-top: 2px solid #eee; position: fixed; bottom: 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; padding: 20px; }
        .jamo.ready { position: static; font-size: 80px; background: white; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* 초롱유치원 로고 */
        #logo { position: fixed; bottom: 20px; right: 20px; width: 150px; height: auto; opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body>
    <div id="menu">
        <button class="btn btn-reset" onclick="resetGame()">♻️ 다시하기</button>
        <div id="hint">이름</div>
        <button class="btn btn-change" onclick="changeName()">✏️ 이름 바꾸기</button>
    </div>

    <div id="drop-zone"></div>
    <div id="bin"></div>

    <!-- 로고 삽입 -->
    <img src="로고.png" id="logo" alt="초롱유치원 로고">

    <script>
        let currentName = "손예은";
        const dropZone = document.getElementById('drop-zone');
        const bin = document.getElementById('bin');
        const hint = document.getElementById('hint');

        function getJamoList(word) {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
            const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            const list = [];
            for (let i = 0; i < word.length; i++) {
                const code = word.charCodeAt(i) - 44032;
                if (code < 0 || code > 11171) continue;
                list.push({ text: cho[Math.floor(code / 588)] });
                list.push({ text: jung[Math.floor((code % 588) / 28)] });
                if (code % 28 !== 0) list.push({ text: jong[code % 28] });
            }
            return list;
        }

        function initGame(newName) {
            currentName = newName;
            hint.innerText = currentName;
            dropZone.innerHTML = '';
            bin.innerHTML = '';
            for(let i=0; i<currentName.length; i++) {
                const box = document.createElement('div');
                box.className = 'char-box';
                dropZone.appendChild(box);
            }
            const pieces = getJamoList(currentName).sort(() => Math.random() - 0.5);
            pieces.forEach(p => createPiece(p.text));
        }

        function createPiece(text) {
            const el = document.createElement('div');
            el.className = 'jamo ready';
            el.innerText = text;
            bin.appendChild(el);

            let ox, oy;
            const start = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                const rect = el.getBoundingClientRect();
                el.classList.remove('ready', 'in-box');
                el.style.color = '#444';
                el.style.position = 'fixed';
                el.style.left = rect.left + 'px';
                el.style.top = rect.top + 'px';
                el.style.fontSize = '120px';
                document.body.appendChild(el);
                ox = ev.clientX - el.offsetLeft;
                oy = ev.clientY - el.offsetTop;

                const move = (me) => {
                    const mev = me.touches ? me.touches[0] : me;
                    el.style.left = (mev.clientX - ox) + 'px';
                    el.style.top = (mev.clientY - oy) + 'px';
                };

                const stop = () => {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', stop);
                    window.removeEventListener('touchmove', move);
                    window.removeEventListener('touchend', stop);
                    let placed = false;
                    const boxes = document.getElementsByClassName('char-box');
                    for (let box of boxes) {
                        const bRect = box.getBoundingClientRect();
                        const eRect = el.getBoundingClientRect();
                        if (eRect.left < bRect.right && eRect.right > bRect.left &&
                            eRect.top < bRect.bottom && eRect.bottom > bRect.top) {
                            box.appendChild(el);
                            el.style.position = 'absolute';
                            el.style.left = (eRect.left - bRect.left) + 'px';
                            el.style.top = (eRect.top - bRect.top) + 'px';
                            el.classList.add('in-box');
                            placed = true;
                            break;
                        }
                    }
                    if (!placed) {
                        el.classList.add('ready');
                        el.style.position = 'static';
                        el.style.fontSize = '80px';
                        bin.appendChild(el);
                    }
                };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                window.addEventListener('touchmove', move, {passive:false});
                window.addEventListener('touchend', stop);
            };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start, {passive:false});
        }

        function resetGame() { initGame(currentName); }
        function changeName() {
            const next = prompt("새로운 이름을 입력하세요", currentName);
            if (next) initGame(next);
        }

        initGame(currentName);
    </script>
</body>
</html>
