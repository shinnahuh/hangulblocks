<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 블록</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; }
        .btn-group { display: flex; gap: 10px; margin: 20px; }
        .btn { padding: 15px 25px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; }
        .btn-add { background: #34C759; }
        .btn-write { background: #007AFF; }
        .btn-save { background: #FF9500; }
        .btn-load { background: #5856D6; }
        #list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { width: 160px; padding: 15px; background: white; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; text-align: center; }
    </style>
</head>
<body>
    <h1>📂 우리 반을 선택해 주세요</h1>
    <div class="btn-group">
        <button class="btn btn-add" onclick="addFolder()">➕ 반 폴더 추가</button>
        <button class="btn btn-write" onclick="goDirect()">✏️ 직접 쓰기</button>
        <button class="btn btn-save" onclick="exportData()">💾 파일 저장</button>
        <button class="btn btn-load" onclick="document.getElementById('file-in').click()">📂 파일 불러오기</button>
    </div>
    <input type="file" id="file-in" style="display:none" accept=".txt">
    <div id="list"></div>

    <script>
        let totalData = JSON.parse(localStorage.getItem('my_class_data') || '{}');

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            Object.keys(totalData).forEach(name => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>📁 ${name}</h3>`;
                div.onclick = () => alert(name + " 폴더 진입 기능 복구 중"); // 여기에 이전의 그 게임 로직을 그대로 입히면 됩니다.
                list.appendChild(div);
            });
        }

        function addFolder() {
            let name = prompt("반 이름을 입력하세요");
            if(name) { totalData[name] = []; localStorage.setItem('my_class_data', JSON.stringify(totalData)); render(); }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(totalData)], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_class.txt';
            a.click();
        }

        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                totalData = JSON.parse(ev.target.result);
                localStorage.setItem('my_class_data', JSON.stringify(totalData));
                render();
            };
            reader.readAsText(e.target.files[0]);
        };

        render();
    </script>
</body>
</html>
