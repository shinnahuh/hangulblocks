<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초롱 한글 블록</title>
    <style>
        /* 선생님의 원래 디자인과 구조를 최대한 복구했습니다 */
        body { font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; padding: 20px; }
        .menu-bar { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn { padding: 15px 20px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; }
        .btn-1 { background: #34C759; } .btn-2 { background: #007AFF; }
        .btn-3 { background: #FF9500; } .btn-4 { background: #5856D6; }
        #list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; }
        .folder-card { width: 160px; height: 140px; background: #FFCC00; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        #game-area { display: none; width: 100%; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
    <h1 id="title">초롱 한글 블록</h1>
    <div id="home-view">
        <div class="menu-bar">
            <button class="btn btn-1" onclick="addFolder()">반 폴더 추가</button>
            <button class="btn btn-2" onclick="goDirect()">직접 쓰기</button>
            <button class="btn btn-3" onclick="exportData()">데이터 내보내기</button>
            <button class="btn btn-4" onclick="document.getElementById('file-in').click()">파일 불러오기</button>
        </div>
        <input type="file" id="file-in" style="display:none" accept=".txt">
        <div id="list"></div>
    </div>

    <div id="game-area">
        <button class="btn" style="background:#aeaeae" onclick="location.reload()">🏠 홈으로</button>
        <div id="target-name" style="font-size:30px; margin:20px;"></div>
        <div id="drop-zone" style="display:flex; gap:10px;"></div>
        <div id="bin" style="height:150px; width:100%; display:flex; justify-content:center; align-items:center; margin-top:20px;"></div>
    </div>

    <script>
        let totalData = JSON.parse(localStorage.getItem('chorong_data') || '{}');

        // 폴더(반) 렌더링
        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            Object.keys(totalData).forEach(name => {
                let div = document.createElement('div');
                div.className = 'folder-card';
                div.innerHTML = `<div style="font-size:40px">📁</div><div>${name}</div>`;
                div.onclick = () => alert("여기에 예전 친구 목록 로직을 다시 연결합니다.");
                list.appendChild(div);
            });
        }

        function addFolder() {
            let name = prompt("반 이름을 입력하세요");
            if(name) { totalData[name] = []; localStorage.setItem('chorong_data', JSON.stringify(totalData)); render(); }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(totalData)], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '초롱한글블록_데이터.txt';
            a.click();
        }

        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                totalData = JSON.parse(ev.target.result);
                localStorage.setItem('chorong_data', JSON.stringify(totalData));
                render();
            };
            reader.readAsText(e.target.files[0]);
        };

        render();
    </script>
</body>
</html>
