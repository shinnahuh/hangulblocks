<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>초롱 한글 블록</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; }
        .menu-bar { margin: 20px; display: flex; gap: 10px; }
        .display-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { width: 180px; height: 180px; background: #FFCC00; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-bar">
        <button onclick="addFolder()">➕ 반 추가</button>
        <button onclick="triggerDirectInput()">✏️ 글자 직접 쓰기</button>
    </div>

    <div class="display-area" id="main-list">
        </div>

    <script>
        // 데이터 구조: { "햇살반": [{name: "철수", photo: "..."}, ...], "바다반": [] }
        let allData = JSON.parse(localStorage.getItem('my_data') || '{}');

        function renderFolders() {
            const list = document.getElementById('main-list');
            list.innerHTML = '';
            Object.keys(allData).forEach(className => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div>📁</div><span>${className}</span>`;
                div.onclick = () => showFriends(className);
                list.appendChild(div);
            });
        }

        function addFolder() {
            const name = prompt("반 이름을 입력하세요:");
            if(name) { allData[name] = []; localStorage.setItem('my_data', JSON.stringify(allData)); renderFolders(); }
        }

        renderFolders();
    </script>
</body>
</html>
