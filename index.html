<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 놀이</title>
    <style>
        body { background: #fdfdfd; margin: 0; overflow: hidden; touch-action: none; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f5f7fa; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding-top: 40px; }
        .btn-add-friend { background: #34C759; color: white; padding: 15px 25px; font-size: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        .friend-list { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .friend-card { width: 180px; background: white; border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; border: 3px solid #ddd; }
        .friend-card img { width: 150px; height: 150px; border-radius: 15px; object-fit: cover; }
        #drop-zone { display: flex; gap: 30px; margin-top: 40px; }
        .char-box { width: 200px; height: 200px; border: 4px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 100px; }
        .jamo { font-size: 80px; background: white; padding: 10px; cursor: grab; }
        #bin { position: fixed; bottom: 0; width: 100%; height: 150px; background: #eee; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>초롱 한글 놀이</h1>
        <button class="btn-add-friend" onclick="addFriend()">친구 추가</button>
        <div class="friend-list" id="friend-list"></div>
    </div>

    <div id="game-area" style="display:none">
        <button onclick="location.reload()">홈으로</button>
        <div id="drop-zone"></div>
        <div id="bin"></div>
    </div>

    <script>
        // 데이터를 브라우저에 저장해서 나중에 다시 와도 그대로 보이게 합니다.
        let friends = JSON.parse(localStorage.getItem('my_friends') || '[]');

        function render() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            friends.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'friend-card';
                div.innerHTML = `<img src="${f.photo}"><span>${f.name}</span>`;
                div.onclick = () => startGame(f.name);
                list.appendChild(div);
            });
        }

        function addFriend() {
            const name = prompt("이름이 뭐야?");
            if(!name) return;
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    friends.push({name, photo: ev.target.result});
                    localStorage.setItem('my_friends', JSON.stringify(friends));
                    render();
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function startGame(name) {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            const dz = document.getElementById('drop-zone');
            const bin = document.getElementById('bin');
            dz.innerHTML = ''; bin.innerHTML = '';
            
            for(let char of name) {
                const box = document.createElement('div');
                box.className = 'char-box';
                box.innerText = char;
                dz.appendChild(box);
            }
            name.split('').forEach(char => {
                const jamo = document.createElement('div');
                jamo.className = 'jamo';
                jamo.innerText = char;
                bin.appendChild(jamo);
            });
        }

        render();
    </script>
</body>
</html>
