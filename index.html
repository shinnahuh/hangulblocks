<!DOCTYPE html><html><head><meta charset="UTF-8"><title>초롱유치원 한글 블록</title>
<style>
body{background:#fdfdfd;margin:0;overflow:hidden;touch-action:none;font-family:sans-serif;display:flex;flex-direction:column;align-items:center}
#start-screen{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#f5f7fa;z-index:1000;display:flex;flex-direction:column;align-items:center;padding-top:40px;overflow-y:auto}
#start-screen h1{font-size:36px;color:#333;margin-bottom:20px}
.btn-group{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
button{cursor:pointer;border:none;border-radius:20px;font-weight:bold;box-shadow:0 4px 6px rgba(0,0,0,0.1);transition:transform 0.1s}
button:active{transform:scale(0.95)}
.b-add{background:#34C759;color:#fff;padding:12px 20px;font-size:16px}
.b-dir{background:#007AFF;color:#fff;padding:12px 20px;font-size:16px}
.b-exp{background:#FF9500;color:#fff;padding:10px 15px;font-size:14px}
.b-imp{background:#5856D6;color:#fff;padding:10px 15px;font-size:14px}
.b-back{background:#aeaeae;color:#fff;padding:10px 20px;margin-bottom:20px}
.list{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;padding:20px 20px 100px;max-width:1000px}
.card{width:200px;height:220px;background:#fff;border-radius:20px;box-shadow:0 6px 15px rgba(0,0,0,0.1);display:flex;flex-direction:column;align-items:center;padding:15px;position:relative;cursor:pointer}
.folder-card{background:#FFCC00;height:180px;justify-content:center}
.card img{width:160px;height:160px;border-radius:15px;object-fit:cover;margin-bottom:10px;background:#eee}
.card span{font-size:22px;font-weight:800;color:#333}
.folder-icon{font-size:60px;margin-bottom:5px}
.btn-del{position:absolute;top:-10px;right:-10px;width:30px;height:30px;background:#FF3B30;color:#fff;border-radius:50%;font-size:16px;z-index:10;display:flex;align-items:center;justify-content:center}
#menu{margin-top:20px;display:flex;gap:10px;align-items:center;z-index:100}
#hint-box{display:flex;align-items:center;gap:15px;background:#fff;padding:10px 25px;border-radius:50px;box-shadow:0 4px 10px rgba(0,0,0,0.05)}
#hint{font-size:40px;font-weight:900;letter-spacing:5px}
#current-photo{width:60px;height:60px;border-radius:50%;object-fit:cover;display:none}
#drop-zone{display:flex;gap:20px;margin-top:40px}
.char-box{width:200px;height:200px;border:4px solid #eee;background:#fff;border-radius:25px;display:flex;align-items:center;justify-content:center;position:relative}
.char-box::before{content:attr(data-hint);font-size:120px;font-weight:900;color:#f0f0f0;position:absolute;pointer-events:none}
.jamo{position:absolute;font-size:90px;font-weight:900;color:#444;cursor:grab;user-select:none;z-index:50}
.jamo.in-box{color:#007AFF;z-index:40}
#bin{width:100%;height:180px;background:#f2f2f2;border-top:2px solid #ddd;position:fixed;bottom:0;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:15px;padding:20px;box-sizing:border-box}
.jamo.ready{position:static;font-size:60px;background:#fff;border-radius:12px;padding:10px 20px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
</style>
</head>
<body>
<div id="start-screen">
    <h1 id="main-title">📂 우리 반을 선택해 주세요</h1>
    <div class="btn-group" id="btn-group-area"></div>
    <button class="b-back" id="btn-back" style="display:none;" onclick="showFolderView()">⬅️ 반 목록으로 돌아가기</button>
    <input type="file" id="file-input" accept="image/*" style="display:none">
    <input type="file" id="import-input" accept=".txt" style="display:none">
    <div class="list" id="main-list"></div>
</div>
<div id="menu">
    <button class="b-back" onclick="goHome()">🏠 처음으로</button>
    <button class="b-exp" onclick="resetGame()">♻️ 다시하기</button>
    <div id="hint-box"><img id="current-photo" src=""><div id="hint">이름</div></div>
    <button class="b-dir" onclick="changeName()">✏️ 직접 쓰기</button>
</div>
<div id="drop-zone"></div><div id="bin"></div>

<script>
let totalData = JSON.parse(localStorage.getItem('cr_classes') || '{}');
function saveData() { localStorage.setItem('cr_classes', JSON.stringify(totalData)); }
let currentClass="", currentName="", currentPhoto="";
const ui={ scr:document.getElementById('start-screen'), tit:document.getElementById('main-title'), btns:document.getElementById('btn-group-area'), back:document.getElementById('btn-back'), lst:document.getElementById('main-list'), dz:document.getElementById('drop-zone'), bin:document.getElementById('bin'), hint:document.getElementById('hint'), pic:document.getElementById('current-photo'), fi:document.getElementById('file-input'), ii:document.getElementById('import-input') };

function showFolderView() {
    currentClass = ""; ui.tit.innerText = "📂 우리 반을 선택해 주세요"; ui.back.style.display = "none";
    ui.btns.innerHTML = `<button class="b-add" onclick="addClass()">➕ 반 추가</button><button class="b-dir" onclick="goDirect()">✏️ 글자 쓰기</button><button class="b-exp" onclick="exportFile()">💾 파일 내보내기</button><button class="b-imp" onclick="ui.ii.click()">📂 파일 불러오기</button>`;
    ui.lst.innerHTML = '';
    Object.keys(totalData).forEach(cn => {
        let d=document.createElement('div'); d.className='card folder-card';
        d.innerHTML=`<button class="btn-del" onclick="delClass(event, '${cn}')">X</button><div class="folder-icon">📁</div><span>${cn}</span>`;
        d.onclick=(e)=>{ if(e.target.tagName!=='BUTTON') enterClass(cn); }; ui.lst.appendChild(d);
    });
}

function enterClass(cn) {
    currentClass=cn; ui.tit.innerText=`🎒 [${cn}] 친구들`; ui.back.style.display="block";
    ui.btns.innerHTML=`<button class="b-add" onclick="ui.fi.click()">📸 사진 찍어 친구 추가</button>`;
    ui.lst.innerHTML='';
    (totalData[cn]||[]).forEach((f,i) => {
        let d=document.createElement('div'); d.className='card';
        d.innerHTML=`<button class="btn-del" onclick="delFriend(event, ${i})">X</button><img src="${f.photo}"><span>${f.name}</span>`;
        d.onclick=(e)=>{ if(e.target.tagName!=='BUTTON') startGame(f.name, f.photo); }; ui.lst.appendChild(d);
    });
}

function addClass() { let n=prompt("새 반 이름:"); if(n&&!totalData[n]){ totalData[n]=[]; saveData(); showFolderView(); } }
function delClass(e,cn) { e.stopPropagation(); if(confirm(`[${cn}] 삭제할까요?`)){ delete totalData[cn]; saveData(); showFolderView(); } }
function delFriend(e,i) { e.stopPropagation(); if(confirm("삭제할까요?")){ totalData[currentClass].splice(i,1); saveData(); enterClass(currentClass); } }
function goDirect() { let n=prompt("글자 입력:"); if(n) startGame(n,""); }
function goHome() { ui.scr.style.display='flex'; currentClass?enterClass(currentClass):showFolderView(); }

// 화질 복구: 최대 350px, 화질 85%로 선명하게 저장
ui.fi.onchange = (e) => {
    let file=e.target.files[0]; if(!file) return;
    let n=prompt("친구 이름:"); if(!n) return;
    let r=new FileReader();
    r.onload=e=>{
        let img=new Image(); img.onload=()=>{
            let cvs=document.createElement('canvas'), w=img.width, h=img.height, m=350;
            if(w>h){ if(w>m){h*=m/w; w=m;} }else{ if(h>m){w*=m/h; h=m;} }
            cvs.width=w; cvs.height=h; cvs.getContext('2d').drawImage(img,0,0,w,h);
            totalData[currentClass].push({name:n, photo:cvs.toDataURL('image/jpeg',0.85)});
            saveData(); enterClass(currentClass);
        }; img.src=e.target.result;
    }; r.readAsDataURL(file); ui.fi.value="";
};

// 파일 내보내기/가져오기 로직
function exportFile() {
    let b=new Blob([JSON.stringify(totalData)],{type:'text/plain'}), a=document.createElement('a');
    a.href=URL.createObjectURL(b); a.download='hangul_class.txt'; a.click(); URL.revokeObjectURL(a.href);
    alert("데이터가 파일로 다운로드되었습니다! 카톡으로 학부모님께 보내주세요.");
}
ui.ii.onchange = (e) => {
    let f=e.target.files[0]; if(!f) return;
    let r=new FileReader();
    r.onload=e=>{ try{ totalData=JSON.parse(e.target.result); saveData(); showFolderView(); alert("데이터 등록 완료!"); }catch(err){ alert("오류가 발생했습니다."); } };
    r.readAsText(f); ui.ii.value="";
};

// 한글 로직 (ㅛ 오타 수정 완료)
const cMap={"ㅐ":["ㅏ","ㅣ"],"ㅒ":["ㅑ","ㅣ"],"ㅔ":["ㅓ","ㅣ"],"ㅖ":["ㅕ","ㅣ"],"ㅘ":["ㅗ","ㅏ"],"ㅙ":["ㅗ","ㅐ"],"ㅚ":["ㅗ","ㅣ"],"ㅝ":["ㅜ","ㅓ"],"ㅞ":["ㅜ","ㅔ"],"ㅟ":["ㅜ","ㅣ"],"ㅢ":["ㅡ","ㅣ"]};
function getJamo(w) {
    let cho=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"],
    jung=["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"],
    jong=["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"], res=[];
    for(let i=0;i<w.length;i++){
        let c=w.charCodeAt(i)-44032; if(c<0||c>11171) continue;
        res.push(cho[Math.floor(c/588)]);
        let j=jung[Math.floor((c%588)/28)]; cMap[j]?res.push(...cMap[j]):res.push(j);
        if(c%28!==0) res.push(jong[c%28]);
    } return res.map(t=>({t}));
}

function startGame(n, p) {
    ui.scr.style.display='none'; currentName=n; currentPhoto=p; ui.hint.innerText=n;
    if(p){ ui.pic.src=p; ui.pic.style.display='block'; }else{ ui.pic.style.display='none'; }
    ui.dz.innerHTML=''; ui.bin.innerHTML='';
    for(let i=0;i<n.length;i++){ let b=document.createElement('div'); b.className='char-box'; b.setAttribute('data-hint',n[i]); ui.dz.appendChild(b); }
    getJamo(n).sort(()=>Math.random()-0.5).forEach(p=>makeP(p.t));
}

function makeP(t) {
    let e=document.createElement('div'); e.className='jamo ready'; e.innerText=t; ui.bin.appendChild(e);
    let ox,oy, start=ev=>{
        let v=ev.touches?ev.touches[0]:ev, r=e.getBoundingClientRect();
        e.classList.remove('ready','in-box'); e.style.color='#444'; e.style.position='fixed';
        e.style.left=r.left+'px'; e.style.top=r.top+'px'; e.style.fontSize='120px';
        document.body.appendChild(e); ox=v.clientX-e.offsetLeft; oy=v.clientY-e.offsetTop;
        let mv=me=>{ let m=me.touches?me.touches[0]:me; e.style.left=(m.clientX-ox)+'px'; e.style.top=(m.clientY-oy)+'px'; },
        up=()=>{
            window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up);
            window.removeEventListener('touchmove',mv); window.removeEventListener('touchend',up);
            let pl=false, bx=document.getElementsByClassName('char-box'), er=e.getBoundingClientRect();
            for(let b of bx){
                let br=b.getBoundingClientRect();
                if(er.left<br.right&&er.right>br.left&&er.top<br.bottom&&er.bottom>br.top){
                    b.appendChild(e); e.style.position='absolute'; e.style.left=(er.left-br.left)+'px'; e.style.top=(er.top-br.top)+'px'; e.classList.add('in-box'); pl=true; break;
                }
            }
            if(!pl){ e.classList.add('ready'); e.style.position='static'; e.style.fontSize='60px'; ui.bin.appendChild(e); }
        };
        window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
        window.addEventListener('touchmove',mv,{passive:false}); window.addEventListener('touchend',up);
    };
    e.addEventListener('mousedown',start); e.addEventListener('touchstart',start,{passive:false});
}
function resetGame(){ startGame(currentName, currentPhoto); }
function changeName(){ let n=prompt("새 이름:"); if(n) startGame(n,""); }
showFolderView();
</script></body></html>
